<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clair — Living Voice Orb</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="/assets/index-ByWnlxMk.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-SFyFdyvv.css">
  </head>
  <body>
    <div id="app">
      <header class="overlay-header">
        <div class="brand">
          <span class="brand-mark">✿</span>
          <div>
            <h1>Clair Voice Orb</h1>
            <p>GLSL glass bubble shell</p>
          </div>
        </div>
      </header>
      <aside id="controls-panel" class="controls-panel">
        <label class="control" for="noise-level">
          <span class="control-label">Noise level</span>
          <span id="noise-level-value" class="control-value">100%</span>
          <input id="noise-level" type="range" min="0" max="1" step="0.01" value="1" />
        </label>
        <label class="control" for="refraction-ratio">
          <span class="control-label">Refraction ratio</span>
          <span id="refraction-ratio-value" class="control-value">0.985</span>
          <input
            id="refraction-ratio"
            type="range"
            min="0.915"
            max="1"
            step="0.001"
            value="0.985"
          />
        </label>
        <label class="control" for="reflectivity">
          <span class="control-label">Reflectivity</span>
          <span id="reflectivity-value" class="control-value">0.55</span>
          <input id="reflectivity" type="range" min="0" max="1.2" step="0.01" value="0.55" />
        </label>
        <label class="control" for="thickness">
          <span class="control-label">Thickness</span>
          <span id="thickness-value" class="control-value">1.5</span>
          <input id="thickness" type="range" min="0" max="5" step="0.1" value="1.5" />
        </label>
      </aside>
      <canvas id="orb-canvas"></canvas>
    </div>
  </body>
</html>
