<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clair Health Voice AI Exploration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <header class="overlay-header">
        <div class="brand">
          <img
            class="brand-mark"
            src="/clair-logo.png"
            alt="Clair Health logo"
            width="40"
            height="40"
          />
          <div>
            <h1>Clair Health Voice AI Exploration</h1>
            <p>Attempts to explore combining floral imagery from the brand with a glass orb</p>
          </div>
        </div>
      </header>
      <aside id="controls-panel" class="controls-panel">
        <p class="controls-section">Voice AI states</p>
        <div id="voice-state-picker" class="state-picker" role="tablist" aria-label="Voice AI state">
          <button type="button" class="state-btn is-active" data-voice-state="idle">Idle</button>
          <button type="button" class="state-btn" data-voice-state="listening">Listening</button>
          <button type="button" class="state-btn" data-voice-state="thinking">Thinking</button>
          <button type="button" class="state-btn" data-voice-state="answering">Answering</button>
        </div>

        <label class="control" for="noise-level">
          <span class="control-label">Noise level</span>
          <span id="noise-level-value" class="control-value">30%</span>
          <input id="noise-level" type="range" min="0" max="1" step="0.01" value="0.3" />
        </label>
        <label class="control" for="wave-density">
          <span class="control-label">Wave density</span>
          <span id="wave-density-value" class="control-value">0.9</span>
          <input id="wave-density" type="range" min="0.1" max="3" step="0.1" value="0.9" />
        </label>
        <label class="control" for="refraction-ratio">
          <span class="control-label">Refraction ratio</span>
          <span id="refraction-ratio-value" class="control-value">0.985</span>
          <input
            id="refraction-ratio"
            type="range"
            min="0.915"
            max="1"
            step="0.001"
            value="0.985"
          />
        </label>
        <label class="control" for="reflectivity">
          <span class="control-label">Reflectivity</span>
          <span id="reflectivity-value" class="control-value">0.55</span>
          <input id="reflectivity" type="range" min="0" max="3" step="0.05" value="0.55" />
        </label>
        <label class="control" for="thickness">
          <span class="control-label">Thickness</span>
          <span id="thickness-value" class="control-value">1.5</span>
          <input id="thickness" type="range" min="0" max="5" step="0.1" value="1.5" />
        </label>

        <p class="controls-section">Colors</p>

        <label class="control control-color" for="wave-primary">
          <span class="control-label">Wave primary</span>
          <input id="wave-primary" type="color" value="#ff9c7a" />
        </label>
        <label class="control control-color" for="wave-secondary">
          <span class="control-label">Wave secondary</span>
          <input id="wave-secondary" type="color" value="#ffc2dc" />
        </label>
        <label class="control control-color" for="shell-tint">
          <span class="control-label">Glass base</span>
          <input id="shell-tint" type="color" value="#ffdbed" />
        </label>
        <label class="control control-color" for="shell-iridescence">
          <span class="control-label">Glass iridescence</span>
          <input id="shell-iridescence" type="color" value="#ff8ac8" />
        </label>
        <label class="control" for="iridescence-strength">
          <span class="control-label">Iridescence blend</span>
          <span id="iridescence-strength-value" class="control-value">55%</span>
          <input
            id="iridescence-strength"
            type="range"
            min="0"
            max="1"
            step="0.01"
            value="0.55"
          />
        </label>
        <label class="control control-color" for="rim-color">
          <span class="control-label">Rim glow</span>
          <input id="rim-color" type="color" value="#fff8f4" />
        </label>

        <p class="controls-section">Wave structure</p>

        <label class="control" for="petal-count">
          <span class="control-label">Petal count</span>
          <span id="petal-count-value" class="control-value">2</span>
          <input id="petal-count" type="range" min="2" max="12" step="1" value="2" />
        </label>
        <label class="control" for="petal-strength">
          <span class="control-label">Petal strength</span>
          <span id="petal-strength-value" class="control-value">0%</span>
          <input id="petal-strength" type="range" min="0" max="1" step="0.01" value="0" />
        </label>
        <label class="control" for="bloom-rings">
          <span class="control-label">Bloom rings</span>
          <span id="bloom-rings-value" class="control-value">0.0</span>
          <input id="bloom-rings" type="range" min="0" max="4" step="0.1" value="0" />
        </label>
        <label class="control" for="fractal-iters">
          <span class="control-label">Fractal depth</span>
          <span id="fractal-iters-value" class="control-value">3</span>
          <input id="fractal-iters" type="range" min="2" max="8" step="1" value="3" />
        </label>
        <label class="control" for="fractal-scale">
          <span class="control-label">Fold tightness</span>
          <span id="fractal-scale-value" class="control-value">0.95</span>
          <input id="fractal-scale" type="range" min="0.65" max="1" step="0.01" value="0.95" />
        </label>
        <label class="control" for="fractal-decay">
          <span class="control-label">Line sharpness</span>
          <span id="fractal-decay-value" class="control-value">-11.0</span>
          <input id="fractal-decay" type="range" min="-28" max="-8" step="0.5" value="-11" />
        </label>
        <label class="control" for="smoothness">
          <span class="control-label">Smoothness</span>
          <span id="smoothness-value" class="control-value">0.040</span>
          <input id="smoothness" type="range" min="0" max="0.1" step="0.001" value="0.04" />
        </label>
        <label class="control" for="asymmetry">
          <span class="control-label">Asymmetry</span>
          <span id="asymmetry-value" class="control-value">0.12</span>
          <input id="asymmetry" type="range" min="0" max="0.8" step="0.01" value="0.12" />
        </label>
      </aside>
      <canvas id="orb-canvas"></canvas>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
